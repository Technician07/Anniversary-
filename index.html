<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Two Years, One Heart ❤️ Aayusha</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap');

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* PAGE */
.page {
  display: none;
  height: 100vh;
  width: 100%;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px;
}

.active {
  display: flex;
}

/* BACKGROUNDS */
#home { background: radial-gradient(circle, #ff4d6d, #0a0a0a); }
#story { background: radial-gradient(circle, #ff4d6d, #0a0a0a); }
#journey { background:radial-gradient(circle, #ff4d6d, #0a0a0a); }
#memory { background: radial-gradient(circle, #1a1a1a, black); }
#love { background: radial-gradient(circle, #ff4d6d, #0a0a0a); }

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  padding: 60px;
  border-radius: 40px;
  max-width: 800px;
  box-shadow: 0 0 50px rgba(255,77,109,0.2);
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* IMAGE */
img {
  width: 280px;
  margin: 20px;
  border-radius: 30px;
  box-shadow: 0 0 20px pink;
}

/* TYPING EFFECT */
.typing {
  font-size: 1.6rem;
  white-space: hidden;
  overflow: hidden;
  border-right: 2px solid white;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h1>❤️ Happy 2 Years, Aayusha</h1>
    <p class="typing" id="t1"></p>
    <button onclick="showPage('story'); typeStory()">
      Begin Journey 💌
    </button>
  </div>
</div>

<!-- STORY -->
<div id="story" class="page">
  <div class="card">
    <h2>Our Beginning</h2>
    <p class="typing" id="t2"></p>
    <button onclick="showPage('journey'); typeJourney()">
      Next Chapter →
    </button>
  </div>
</div>

<!-- JOURNEY -->
<div id="journey" class="page">
  <div class="card">
    <h2>Our Journey</h2>
    <p class="typing" id="t3"></p>
    <button onclick="showPage('memory')">
      Next Chapter →
    </button>
  </div>
</div>

<!-- MEMORY -->
<div id="memory" class="page">
  <div class="card">
    <h2>Memories 📸</h2>
<img src="Screenshot_2026-04-27-16-31-57-810_com.zhiliaoapp.musically-edit.jpg">

    <p class="typing" id="t4"></p>

    <button onclick="showPage('love'); typeLove()">
      Final Chapter ❤️
    </button>
  </div>
</div>

<!-- LOVE -->
<div id="love" class="page">
  <div class="card">
    <h2>Forever ❤️</h2>
      <img src="Screenshot_2026-04-27-16-41-16-674_com.instagram.android-edit.jpg">
    
    <p class="typing" id="t5"></p>

    <button onclick="showPage('home')">
      Restart 🔁
    </button>
  </div>
</div>

<script>
function showPage(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* TYPING FUNCTION */
function typeText(elementId, text, speed=40){
  let i = 0;
  let el = document.getElementById(elementId);
  el.innerHTML = "";

  function typing(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

/* HOME TEXT */
function typeHome(){
  typeText("t1",
`Not every story is written in books...
Some are written in hearts.🫶

This is ours — 2 years of love, silence, smiles, and memories.❤️`);
}

/* STORY TEXT */
function typeStory(){
  typeText("t2",
`It all started unexpectedly...
Two simple souls, one connection, and a feeling we never understood at first.

But slowly, it became something real... something beautiful.😚`);
}

/* JOURNEY TEXT */
function typeJourney(){
  typeText("t3",
`We didn’t plan this journey.
It just happened.💕

Every conversation, every silence, every smile built something stronger...And its always you makes me feel happy
Something called LOVE.😍`);
}

/* MEMORY TEXT */
function typeMemory(){
  typeText("t4",
`These are not just photos...
They are frozen emotions.
I am so lucky to have you in my life.❤️
Moments I will never lose, even if time passes.`);
}

/* LOVE TEXT */
function typeLove(){
  typeText("t5",
`Aayusha ❤️

If I had to choose again,
I would still choose you...😚 You are the happiness and the love of my life.

In every lifetime, in every world, in every story.

You are my forever babe🥹♾️. I love you So muchhh🫶😚`);
}

/* INIT */
typeHome();
</script>

</body>
</html>
